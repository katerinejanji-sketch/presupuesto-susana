// Convert DB row to app format
function dbToApp(row) {
  return {
    id: row.id,
    code: row.code,
    clientName: row.client_name,
    projectName: row.project_name,
    projectType: row.project_type,
    target: row.target,
    city: row.city,
    date: row.date,
    status: row.status,
    areas: row.areas || [],
    notes: row.notes,
    createdAt: row.created_at,
  };
}

// Convert app format to DB row
function appToDb(b) {
  return {
    code: b.code,
    client_name: b.clientName,
    project_name: b.projectName,
    project_type: b.projectType,
    target: b.target,
    city: b.city,
    date: b.date,
    status: b.status,
    areas: b.areas || [],
    notes: b.notes,
  };
}

async function loadBudgets() {
  try {
    const { data, error } = await supabase.from("ms_budgets").select("*").order("created_at", { ascending: false });
    if (error) throw error;
    return (data || []).map(dbToApp);
  } catch (e) {
    console.error("Load error:", e);
    return [];
  }
}

async function saveBudget(budget) {
  try {
    const row = appToDb(budget);
    if (budget.id && typeof budget.id === "string" && budget.id.includes("-")) {
      // Existing UUID — update
      const { error } = await supabase.from("ms_budgets").update(row).eq("id", budget.id);
      if (error) throw error;
    } else {
      // New budget — insert
      const { error } = await supabase.from("ms_budgets").insert(row);
      if (error) throw error;
    }
    return true;
  } catch (e) {
    console.error("Save error:", e);
    return false;
  }
}

async function deleteBudget(id) {
  try {
    const { error } = await supabase.from("ms_budgets").delete().eq("id", id);
    if (error) throw error;
    return true;
  } catch (e) {
    console.error("Delete error:", e);
    return false;
  }
}

// Catalog loaded from Supabase
async function loadCatalog() {
  try {
    const { data, error } = await supabase.from("ms_catalog").select("*").order("position");
    if (error) throw error;
    return data || [];
  } catch (e) { console.error("Catalog error:", e); return []; }
}
async function saveCatalogItem(item) {
  try {
    if (item.id) {
      const { error } = await supabase.from("ms_catalog").update({ name: item.name, position: item.position, sub_items: item.sub_items }).eq("id", item.id);
      if (error) throw error;
    } else {
      const { error } = await supabase.from("ms_catalog").insert({ name: item.name, position: item.position, sub_items: item.sub_items || [] });
      if (error) throw error;
    }
    return true;
  } catch (e) { console.error("Save catalog error:", e); return false; }
}
async function deleteCatalogItem(id) {
  try {
    const { error } = await supabase.from("ms_catalog").delete().eq("id", id);
    if (error) throw error;
    return true;
  } catch (e) { console.error("Del catalog error:", e); return false; }
}

function generateCode() {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let code = "";
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

function formatUSD(n) {
  return "$" + Number(n || 0).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// ─── MAIN APP ───
function App() {
  const [view, setView] = useState("landing"); // landing | admin_login | admin | client_login | client
  const [budgets, setBudgets] = useState([]);
  const [loading, setLoading] = useState(true);
  const [clientBudget, setClientBudget] = useState(null);

  const [catalog, setCatalog] = useState([]);
  useEffect(() => {
    Promise.all([loadBudgets(), loadCatalog()]).then(([b, c]) => { setBudgets(b); setCatalog(c); setLoading(false); });
  }, []);

  const reloadCatalog = useCallback(async () => { const c = await loadCatalog(); setCatalog(c); }, []);

  const reload = useCallback(async () => {
    const b = await loadBudgets();
    setBudgets(b);
  }, []);

  if (loading) return <LoadingScreen />;

  switch (view) {
    case "landing":
      return <LandingPage onAdmin={() => setView("admin_login")} onClient={() => setView("client_login")} />;
    case "admin_login":
      return <AdminLogin onSuccess={() => setView("admin")} onBack={() => setView("landing")} />;
    case "admin":
      return <AdminPanel budgets={budgets} reload={reload} catalog={catalog} reloadCatalog={reloadCatalog} onLogout={() => setView("landing")} />;
    case "client_login":
      return <ClientLogin budgets={budgets} onSuccess={(b) => { setClientBudget(b); setView("client"); }} onBack={() => setView("landing")} />;
    case "client":
      return <ClientView budget={clientBudget} onBack={() => setView("landing")} />;
    default:
      return null;
  }
}

// ─── ADMIN PANEL ───
function AdminPanel({ budgets, reload, catalog, reloadCatalog, onLogout }) {
  const [selected, setSelected] = useState(null);
  const [showForm, setShowForm] = useState(false);

  const handleNew = () => {
    setSelected(null);
    setShowForm(true);
  };
  const handleEdit = (b) => {
    setSelected(b);
    setShowForm(true);
  };
  const handleSave = async (budget) => {
    let updated;
    if (!budget.code) {
      budget.code = generateCode();
    }
    await saveBudget(budget);
    await reload();
    setShowForm(false);
    setSelected(null);
  };
  const handleDelete = async (id) => {
    await deleteBudget(id);
    await reload();
  };
  const handleDuplicate = async (b) => {
    const dup = {
      ...JSON.parse(JSON.stringify(b)),
      id: undefined,
      code: generateCode(),
      clientName: b.clientName + " (copia)",
      status: "borrador",
    };
    await saveBudget(dup);
    await reload();
  };

  if (showForm) {
    if (showCatalog) return <CatalogManager catalog={catalog} reloadCatalog={reloadCatalog} onBack={() => setShowCatalog(false)} />;
    return <BudgetForm budget={selected} catalog={catalog} onSave={handleSave} onCancel={() => { setShowForm(false); setSelected(null); }} />;
  }

  const sorted = [...budgets].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
  const totalActive = budgets.filter(b => ["enviado", "aprobado", "en_ejecucion"].includes(b.status)).length;
  const totalValue = budgets.reduce((s, b) => s + (b.areas || []).reduce((a, ar) => a + (Number(ar.cost) || 0), 0), 0);

  return (
    <div style={{ background: colors.bg, minHeight: "100vh", fontFamily: fontSans, color: colors.text }}>
      <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
      {/* Header */}
      <div style={{ background: colors.surface, borderBottom: `1px solid ${colors.border}`, padding: "16px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <img src={LOGO_SRC} alt="MS" style={{ height: 36 }} />
          <div>
            <div style={{ fontFamily: font, fontSize: 18, color: colors.white }}>Panel de Presupuestos</div>
            <div style={{ fontSize: 11, color: colors.textMuted, letterSpacing: 1 }}>ADMINISTRACIÓN</div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          <button onClick={handleNew} style={{ ...btnPrimary, padding: "8px 20px", fontSize: 13 }}>+ Nuevo Presupuesto</button>
          <button onClick={() => setShowCatalog(true)} style={{ ...btnSecondary, padding: "8px 16px", fontSize: 12 }}>⚙️ Catálogo</button>
          <button onClick={onLogout} style={{ ...btnSecondary, padding: "8px 16px", fontSize: 12 }}>Salir</button>
        </div>
      </div>

      {/* Stats */}
      <div style={{ display: "flex", gap: 16, padding: "20px 24px", flexWrap: "wrap" }}>
        {[
          { label: "Total Presupuestos", value: budgets.length },
          { label: "Activos", value: totalActive },
          { label: "Valor Total", value: formatUSD(totalValue) },
        ].map((s, i) => (
          <div key={i} style={{ background: colors.surface, border: `1px solid ${colors.border}`, borderRadius: 8, padding: "14px 22px", flex: "1 1 140px", minWidth: 140 }}>
            <div style={{ fontSize: 11, color: colors.textMuted, letterSpacing: 1, textTransform: "uppercase", marginBottom: 4 }}>{s.label}</div>
            <div style={{ fontSize: 22, fontFamily: font, color: colors.goldLight }}>{s.value}</div>
          </div>
        ))}
      </div>

      {/* List */}
      <div style={{ padding: "0 24px 40px" }}>
        {sorted.length === 0 ? (
          <div style={{ textAlign: "center", padding: 60, color: colors.textMuted }}>
            <div style={{ fontSize: 40, marginBottom: 16 }}>📋</div>
            <div style={{ fontSize: 15 }}>No hay presupuestos creados</div>
            <div style={{ fontSize: 13, marginTop: 8 }}>Haz clic en "+ Nuevo Presupuesto" para comenzar</div>

        ) : sorted.map(b => {
          const total = (b.areas || []).reduce((s, a) => s + (Number(a.cost) || 0), 0);
          const st = STATUS_OPTIONS.find(s => s.value === b.status) || STATUS_OPTIONS[0];
          const pt = PROJECT_TYPES[b.projectType] || PROJECT_TYPES.remodelacion;
          return (
            <div key={b.id} style={{

              transition: "border-color 0.2s",

            >

                  <div style={{ fontFamily: font, fontSize: 17, color: colors.white }}>{b.clientName}</div>
                  <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, background: `${st.color}22`, color: st.color, fontWeight: 600 }}>
                    {st.label}

                </div>
                <div style={{ fontSize: 12, color: colors.textMuted }}>

                </div>

                <button onClick={() => { if (confirm(`¿Eliminar presupuesto de ${b.clientName}?`)) handleDelete(b.id); }} style={{ ...btnMini, borderColor: colors.danger + "44" }} title="Eliminar">🗑️</button>

    </div>
  );
}

// ─── BUDGET FORM ───
function BudgetForm({ budget, catalog, onSave, onCancel }) {
  const isEdit = !!budget;
  const [form, setForm] = useState(budget || {
    clientName: "", projectName: "", projectType: "remodelacion", status: "borrador",
    city: "", areas: [], notes: "", target: "alta_gama",
  });

  const update = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

  const addArea = () => {
    update("areas", [...(form.areas || []), { name: "", m2: "", costM2: "", cost: "", description: "", subItems: [] }]);
  };
  const recalcAreaCost = (area) => {
    const subs = area.subItems || [];
    if (subs.length > 0 && subs.some(s => Number(s.cost) > 0)) {
      area.cost = subs.reduce((s, sub) => s + (Number(sub.cost) || 0), 0).toFixed(2);
    }
    return area;
  };
  const updateArea = (i, k, v) => {
    const areas = [...form.areas];
    areas[i] = { ...areas[i], [k]: v };
    if (k === "m2" || k === "costM2") {
      const m2 = Number(k === "m2" ? v : areas[i].m2) || 0;
      const costM2 = Number(k === "costM2" ? v : areas[i].costM2) || 0;
      if (m2 > 0 && costM2 > 0) areas[i].cost = (m2 * costM2).toFixed(2);
    }
    update("areas", areas);
  };
  const removeArea = (i) => {
    update("areas", form.areas.filter((_, idx) => idx !== i));
  };
  const addPreset = (name) => {
    if (!form.areas.find(a => a.name === name)) {
      update("areas", [...(form.areas || []), { name, m2: "", costM2: "", cost: "", description: "", subItems: [], position: (form.areas || []).length + 1 }]);
    }
  };
  const addFromCatalog = (catItem) => {
    if (!form.areas.find(a => a.name === catItem.name)) {
      const subs = (catItem.sub_items || []).map(s => ({ name: s.name, cost: "" }));
      update("areas", [...(form.areas || []), { name: catItem.name, m2: "", costM2: "", cost: "", description: "", subItems: subs, position: catItem.position }]);
    }
  };

  const total = (form.areas || []).reduce((s, a) => s + (Number(a.cost) || 0), 0);

  const handleSubmit = () => {
    if (!form.clientName.trim()) return alert("El nombre del cliente es obligatorio");
    onSave(form);
  };

  const presets = catalog || [];

  return (
    <div style={{ background: colors.bg, minHeight: "100vh", fontFamily: fontSans, color: colors.text }}>
      <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
      <div style={{ background: colors.surface, borderBottom: `1px solid ${colors.border}`, padding: "16px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
        <div style={{ fontFamily: font, fontSize: 20, color: colors.white }}>
          {isEdit ? `Editar — ${form.clientName}` : "Nuevo Presupuesto"}
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={onCancel} style={btnSecondary}>Cancelar</button>
          <button onClick={handleSubmit} style={btnPrimary}>💾 Guardar</button>
        </div>
      </div>

      <div style={{ maxWidth: 900, margin: "0 auto", padding: 24 }}>
        {/* Client info */}
        <Section title="Datos del Cliente y Proyecto">
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 16 }}>
            <Field label="Nombre del Cliente *">
              <input value={form.clientName} onChange={e => update("clientName", e.target.value)} style={inputStyle} placeholder="Ej: Susana Martínez" />
            </Field>
            <Field label="Nombre del Proyecto">
              <input value={form.projectName} onChange={e => update("projectName", e.target.value)} style={inputStyle} placeholder="Ej: Remodelación Casa Los Prados" />
            </Field>
            <Field label="Tipo de Proyecto">
              <select value={form.projectType} onChange={e => update("projectType", e.target.value)} style={inputStyle}>
                {Object.entries(PROJECT_TYPES).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
              </select>
            </Field>
            <Field label="Ciudad">
              <input value={form.city || ""} onChange={e => update("city", e.target.value)} style={inputStyle} placeholder="Ej: Caracas" />
            </Field>
            <Field label="Status">
              <select value={form.status} onChange={e => update("status", e.target.value)} style={inputStyle}>
                {STATUS_OPTIONS.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
              </select>
            </Field>
            <Field label="Target">
              <select value={form.target || "alta_gama"} onChange={e => update("target", e.target.value)} style={inputStyle}>
                <option value="estandar">Estándar</option>
                <option value="alta_gama">Alta Gama</option>
                <option value="premium">Premium / Lujo</option>
              </select>
            </Field>
          </div>
        </Section>

        {/* Quick add presets */}
        <Section title="Partidas del Catálogo (clic para agregar)">
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {presets.map(p => (
              <button key={p.id} onClick={() => addFromCatalog(p)}
                style={{
                  padding: "5px 12px", borderRadius: 6, border: `1px solid ${colors.border}`,
                  background: form.areas?.find(a => a.name === p.name) ? colors.goldMuted : "transparent",
                  color: form.areas?.find(a => a.name === p.name) ? colors.goldLight : colors.textMuted,
                  cursor: "pointer", fontSize: 12, fontFamily: fontSans,
                  transition: "all 0.2s",
                }}
              >{p.position}. {p.name}</button>
            ))}
          </div>
        </Section>

        {/* Areas table */}
        <Section title={`Áreas del Presupuesto (${(form.areas || []).length})`}>
          {(form.areas || []).map((area, i) => (
            <div key={i} style={{
              background: colors.surface2, border: `1px solid ${colors.border}`, borderRadius: 8,
              padding: 14, marginBottom: 10,
            }}>
              <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr auto", gap: 10, alignItems: "end" }}>
                <Field label={i === 0 ? "Área" : ""} compact>
                  <input value={area.name} onChange={e => updateArea(i, "name", e.target.value)} style={inputStyle} placeholder="Nombre del área" />
                </Field>
                <Field label={i === 0 ? "m²" : ""} compact>
                  <input type="number" value={area.m2} onChange={e => updateArea(i, "m2", e.target.value)} style={inputStyle} placeholder="0" />
                </Field>
                <Field label={i === 0 ? "$/m²" : ""} compact>
                  <input type="number" value={area.costM2} onChange={e => updateArea(i, "costM2", e.target.value)} style={inputStyle} placeholder="0" />
                </Field>
                <Field label={i === 0 ? "Costo Total $" : ""} compact>
                  <input type="number" value={area.cost} onChange={e => updateArea(i, "cost", e.target.value)} style={{ ...inputStyle, color: colors.goldLight, fontWeight: 600 }} placeholder="0" />
                </Field>
                <button onClick={() => removeArea(i)} style={{ ...btnMini, marginBottom: 2 }}>✕</button>
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
                <input value={area.description || ""} onChange={e => updateArea(i, "description", e.target.value)}
                  style={{ ...inputStyle, fontSize: 12, flex: 1 }} placeholder="Descripción / detalles (opcional)" />
                <input type="number" value={area.position || ""} onChange={e => updateArea(i, "position", e.target.value)}
                  style={{ ...inputStyle, fontSize: 12, width: 70, textAlign: "center" }} placeholder="Pos." title="Posición en el presupuesto" />
              </div>
              {/* Sub-partidas */}
              <div style={{ marginTop: 8, paddingTop: 8, borderTop: `1px dashed ${colors.border}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                  <span style={{ fontSize: 11, color: colors.textMuted, letterSpacing: 0.5 }}>Sub-partidas (opcional)</span>
                  <button onClick={() => {
                    const areas = [...form.areas];
                    const subs = areas[i].subItems || [];
                    subs.push({ name: "", cost: "" });
                    areas[i] = { ...areas[i], subItems: subs };
                    update("areas", areas);
                  }} style={{ padding: "2px 10px", borderRadius: 4, border: `1px solid ${colors.border}`, background: "transparent", color: colors.textMuted, cursor: "pointer", fontSize: 11, fontFamily: fontSans }}>+ Sub-partida</button>
                </div>
                {(area.subItems || []).map((sub, si) => (
                  <div key={si} style={{ display: "grid", gridTemplateColumns: "2fr 1fr auto", gap: 8, marginBottom: 4 }}>
                    <input value={sub.name} onChange={e => {
                      const areas = [...form.areas];
                      const subs = [...(areas[i].subItems || [])];
                      subs[si] = { ...subs[si], name: e.target.value };
                      areas[i] = { ...areas[i], subItems: subs };
                      update("areas", areas);
                    }} style={{ ...inputStyle, fontSize: 12, padding: "6px 10px" }} placeholder="Nombre sub-partida" />
                    <input type="number" value={sub.cost} onChange={e => {
                      const areas = [...form.areas];
                      const subs = [...(areas[i].subItems || [])];
                      subs[si] = { ...subs[si], cost: e.target.value };
                      areas[i] = { ...areas[i], subItems: subs };
                      areas[i] = recalcAreaCost(areas[i]);
                      update("areas", areas);
                    }} style={{ ...inputStyle, fontSize: 12, padding: "6px 10px", color: colors.goldLight }} placeholder="$0" />
                    <button onClick={() => {
                      const areas = [...form.areas];
                      const subs = (areas[i].subItems || []).filter((_, idx) => idx !== si);
                      areas[i] = { ...areas[i], subItems: subs };
                      update("areas", areas);
                    }} style={{ ...btnMini, width: 24, height: 24, fontSize: 11 }}>✕</button>
                  </div>
                ))}
              </div>
            </div>
          ))}
          <button onClick={addArea} style={{ ...btnSecondary, width: "100%", marginTop: 8 }}>+ Agregar Área</button>

          {/* Total */}
          <div style={{
            marginTop: 16, padding: "14px 18px", background: colors.goldMuted, borderRadius: 8,
            display: "flex", justifyContent: "space-between", alignItems: "center",
            border: `1px solid ${colors.gold}33`,
          }}>
            <span style={{ fontFamily: font, fontSize: 16, color: colors.white }}>TOTAL ESTIMADO</span>
            <span style={{ fontFamily: font, fontSize: 28, color: colors.goldLight }}>{formatUSD(total)}</span>
          </div>
        </Section>

        {/* Notes */}
        <Section title="Notas Adicionales">
          <textarea value={form.notes || ""} onChange={e => update("notes", e.target.value)}
            style={{ ...inputStyle, minHeight: 80, resize: "vertical" }}
            placeholder="Observaciones, condiciones especiales, exclusiones adicionales..." />
        </Section>
      </div>
    </div>
  );
}

                    </div>

                </div>
              )}
            </div>
          );})}
        </div>

        {/* Total */}
        <div style={{
          background: `linear-gradient(135deg, ${colors.gold}22, ${colors.gold}11)`,
          border: `1px solid ${colors.gold}44`, borderRadius: 10,
          padding: 24, textAlign: "center", marginBottom: 24,

        <div style={{
          background: colors.surface, border: `1px solid ${colors.border}`, borderRadius: 10,

              <div style={{ marginBottom: 6 }}>• Pago en USD. Cuenta bancaria a indicar al momento de la firma.</div>
              <div style={{ marginBottom: 16 }}>• Aprobación monetaria exclusiva de la CEO Arq. Milagros Sánchez.</div>

              <div style={{ fontFamily: font, fontSize: 14, color: colors.white, marginBottom: 12 }}>Alcances No Incluidos en esta Oferta</div>
              <div style={{ marginBottom: 6, color: colors.text }}>Para evitar malentendidos, se deja constancia explícita de que esta oferta no contempla:</div>
              <div style={{ marginBottom: 5 }}><strong style={{ color: "#C17070" }}>✕</strong> Honorarios de supervisión o inspección de obra (se cotizan por separado).</div>
              <div style={{ marginBottom: 5 }}><strong style={{ color: "#C17070" }}>✕</strong> Proyectos de ingeniería que no aparezcan dentro del presupuesto. Esta oferta solo incluye esquemas referenciales derivados del diseño. El desarrollo técnico definitivo se cotiza por separado con los especialistas aliados, de estar interesados en su contratación.</div>
              <div style={{ marginBottom: 5 }}><strong style={{ color: "#C17070" }}>✕</strong> Estudio de suelo (se cotiza por separado, sujeto a ubicación y profundidad requerida).</div>
              <div style={{ marginBottom: 5 }}><strong style={{ color: "#C17070" }}>✕</strong> Trámites ante alcaldía, condominio o autoridad correspondiente. MS ARQUITECTA suministra la información planimétrica; el cliente realiza los trámites.</div>
              <div style={{ marginBottom: 5 }}><strong style={{ color: "#C17070" }}>✕</strong> Entrega del archivo editable del modelo 3D y/o 2D.</div>
              <div style={{ marginBottom: 5 }}><strong style={{ color: "#C17070" }}>✕</strong> Impresión física de planos.</div>
              <div style={{ marginBottom: 5 }}><strong style={{ color: "#C17070" }}>✕</strong> Estudios o proyectos adicionales no especificados que surjan por razones técnicas durante el desarrollo.</div>
              <div style={{ marginBottom: 5 }}><strong style={{ color: "#C17070" }}>✕</strong> Honorarios de obras de arte, piezas artísticas y elementos decorativos específicos sujetos a disponibilidad de mercado o artista.</div>
            </>
          ) : (
            <>
              <div style={{ fontFamily: font, fontSize: 14, color: colors.white, marginBottom: 10 }}>Notas Importantes</div>
              <div style={{ marginBottom: 8 }}>
                • Las áreas intervenidas contemplan intervenciones menores de obras civiles, 100% carpintería y un target de <strong style={{ color: colors.text }}>{targetLabels[budget.target] || "Alta Gama"}</strong>. Incluye mobiliario de los espacios mencionados.
              </div>
              <div style={{ marginBottom: 8 }}>
                • Los presentes costos <strong style={{ color: "#C17070" }}>NO incluyen</strong> reparación de daños ocultos ni modificaciones solicitadas por el cliente durante la ejecución de la obra.
              </div>
              <div style={{ marginBottom: 8 }}>
                • Los montos presentados son estimaciones basadas en experiencia previa en proyectos similares. El presupuesto definitivo se formalizará tras levantamiento en sitio.
              </div>
              <div>
                • Presupuesto válido por 30 días a partir de la fecha de emisión. Sujeto a variaciones por condiciones de mercado.
              </div>
            </>
          )}
          {budget.notes && (
            <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${colors.border}`, color: colors.text }}>
              {budget.notes}
            </div>
          )}
        </div>

        {/* Documents */}
        <div style={{ marginBottom: 24 }}>
          <div style={{ fontFamily: font, fontSize: 18, color: colors.goldLight, marginBottom: 14, paddingBottom: 8, borderBottom: `1px solid ${colors.border}` }}>
            Documentos
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12 }}>
            {[
              { label: "Portafolio 2026", thumb: THUMB_PORT, desc: "Proyectos realizados", href: "docs/portafolio.pdf" },
              { label: "Tarjeta Arq. Milagros Sánchez", thumb: THUMB_MS, desc: "CEO | MS Arquitecta", href: "docs/tarjeta_ms.pdf" },
              { label: "Tarjeta Lcda. Katherine Janji", thumb: THUMB_KJ, desc: "General Manager", href: "docs/tarjeta_kj.pdf" },
            ].map((doc, i) => (
              <a key={i} href={doc.href} target="_blank" rel="noopener noreferrer" style={{ textDecoration: "none" }}>
              <div style={{
                background: colors.surface, border: `1px solid ${colors.border}`, borderRadius: 10,
                overflow: "hidden", transition: "border-color 0.2s", cursor: "pointer",
              }}
                onMouseEnter={e => e.currentTarget.style.borderColor = colors.gold}
                onMouseLeave={e => e.currentTarget.style.borderColor = colors.border}
              >
                <div style={{ width: "100%", height: 160, overflow: "hidden", background: "#1a1a1a" }}>
                  <img src={doc.thumb} alt={doc.label} style={{ width: "100%", height: "100%", objectFit: "cover", opacity: 0.9 }} />

                  <div style={{ fontFamily: font, fontSize: 13, color: colors.white, marginBottom: 2 }}>{doc.label}</div>

      </div>
    </div>

// ─── CATALOG MANAGER ───
function CatalogManager({ catalog, reloadCatalog, onBack }) {
  const [editItem, setEditItem] = useState(null);
  const [newName, setNewName] = useState("");
  const [newPos, setNewPos] = useState("");
  const [newSubs, setNewSubs] = useState([]);

  const startEdit = (item) => {
    setEditItem(item);
    setNewName(item.name);
    setNewPos(item.position);
    setNewSubs(item.sub_items || []);
  };
  const startNew = () => {
    setEditItem({});
    setNewName("");
    setNewPos(catalog.length + 1);
    setNewSubs([]);
  };
  const handleSave = async () => {
    if (!newName.trim()) return;
    await saveCatalogItem({ id: editItem.id, name: newName.trim(), position: Number(newPos) || 0, sub_items: newSubs });
    await reloadCatalog();
    setEditItem(null);
  };
  const handleDelete = async (id) => {
    if (!confirm("¿Eliminar esta partida del catálogo?")) return;
    await deleteCatalogItem(id);
    await reloadCatalog();
  };

  return (
    <div style={{ background: colors.bg, minHeight: "100vh", fontFamily: fontSans, color: colors.text }}>
      <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
      <div style={{ background: colors.surface, borderBottom: `1px solid ${colors.border}`, padding: "16px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
        <div style={{ fontFamily: font, fontSize: 20, color: colors.white }}>⚙️ Catálogo de Partidas</div>
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={startNew} style={{ ...btnPrimary, padding: "8px 20px", fontSize: 13 }}>+ Nueva Partida</button>
          <button onClick={onBack} style={{ ...btnSecondary, padding: "8px 16px", fontSize: 12 }}>← Volver</button>
        </div>
      </div>
      <div style={{ maxWidth: 800, margin: "0 auto", padding: 24 }}>
        {editItem && (
          <div style={{ background: colors.surface, border: `1px solid ${colors.gold}44`, borderRadius: 10, padding: 20, marginBottom: 24 }}>
            <div style={{ fontFamily: font, fontSize: 16, color: colors.goldLight, marginBottom: 12 }}>{editItem.id ? "Editar Partida" : "Nueva Partida"}</div>
            <div style={{ display: "grid", gridTemplateColumns: "3fr 1fr", gap: 12, marginBottom: 12 }}>
              <input value={newName} onChange={e => setNewName(e.target.value)} style={inputStyle} placeholder="Nombre de la partida" />
              <input type="number" value={newPos} onChange={e => setNewPos(e.target.value)} style={inputStyle} placeholder="Posición" />
            </div>
            <div style={{ marginBottom: 8, fontSize: 12, color: colors.textMuted }}>Sub-partidas:</div>
            {newSubs.map((s, i) => (
              <div key={i} style={{ display: "flex", gap: 8, marginBottom: 4 }}>
                <input value={s.name} onChange={e => { const ns = [...newSubs]; ns[i] = { ...ns[i], name: e.target.value }; setNewSubs(ns); }}
                  style={{ ...inputStyle, fontSize: 12, flex: 1 }} placeholder="Nombre sub-partida" />
                <button onClick={() => setNewSubs(newSubs.filter((_, idx) => idx !== i))} style={{ ...btnMini, width: 28, height: 28, fontSize: 11 }}>✕</button>
              </div>
            ))}
            <button onClick={() => setNewSubs([...newSubs, { name: "" }])} style={{ ...btnSecondary, padding: "4px 12px", fontSize: 11, marginTop: 4, marginBottom: 12 }}>+ Sub-partida</button>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={handleSave} style={{ ...btnPrimary, padding: "8px 20px", fontSize: 13 }}>💾 Guardar</button>
              <button onClick={() => setEditItem(null)} style={{ ...btnSecondary, padding: "8px 16px", fontSize: 12 }}>Cancelar</button>
            </div>
          </div>
        )}
        {catalog.map(item => (
          <div key={item.id} style={{ background: colors.surface, border: `1px solid ${colors.border}`, borderRadius: 8, padding: 14, marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
            <div style={{ flex: 1, minWidth: 200 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 11, color: colors.gold, fontWeight: 600, minWidth: 24 }}>{item.position}.</span>
                <span style={{ fontFamily: font, fontSize: 15, color: colors.white }}>{item.name}</span>
              </div>
              {item.sub_items && item.sub_items.length > 0 && (
                <div style={{ fontSize: 11, color: colors.textMuted, marginTop: 4, paddingLeft: 32 }}>
                  Sub: {item.sub_items.map(s => s.name).join(", ")}
                </div>
              )}
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={() => startEdit(item)} style={btnMini}>✏️</button>
              <button onClick={() => handleDelete(item.id)} style={{ ...btnMini, borderColor: colors.danger + "44" }}>🗑️</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── UI Components ───
function Section({ title, children }) {
  return (
    <div style={{ marginBottom: 28 }}>
      <div style={{
        fontFamily: font, fontSize: 16, color: colors.goldLight, marginBottom: 14,
        paddingBottom: 6, borderBottom: `1px solid ${colors.border}`,
        letterSpacing: 0.5,
      }}>{title}</div>
      {children}
    </div>
  );
}

function Field({ label, children, compact }) {
  return (
    <div style={{ marginBottom: compact ? 0 : 4 }}>
      {label && <div style={{ fontSize: 11, color: colors.textMuted, marginBottom: 4, letterSpacing: 0.5 }}>{label}</div>}
      {children}
    </div>
  );
}

  width: "100%", padding: "9px 12px", background: colors.surface2, border: `1px solid ${colors.border}`,
  borderRadius: 6, color: colors.text, fontSize: 14, fontFamily: fontSans, outline: "none",
  boxSizing: "border-box", transition: "border-color 0.2s",

const btnPrimary = {
  padding: "12px 28px", background: `linear-gradient(135deg, ${colors.gold}, ${colors.goldLight})`,

  fontFamily: fontSans, cursor: "pointer", letterSpacing: 0.5, transition: "opacity 0.2s",
  display: "flex", alignItems: "center", justifyContent: "center",
};

const btnSecondary = {
  padding: "12px 24px", background: "transparent", border: `1px solid ${colors.border}`,
  borderRadius: 8, color: colors.textMuted, fontSize: 13, fontFamily: fontSans,
  cursor: "pointer", transition: "all 0.2s", display: "flex", alignItems: "center", justifyContent: "center",
};

const btnMini = {
  width: 32, height: 32, display: "flex", alignItems: "center", justifyContent: "center",
  background: "transparent", border: `1px solid ${colors.border}`, borderRadius: 6,
  cursor: "pointer", fontSize: 14, transition: "all 0.2s",
};


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
